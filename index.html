<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>TULI7 V5</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0b0f14; color:#e6edf3; }
.screen { display:none; padding:16px; }
.active { display:block; }
button { width:100%; padding:14px; margin:6px 0; border:none; border-radius:8px; background:#1f2937; color:white; font-size:16px; }
button.active { background:#2563eb; }
input { width:100%; padding:12px; margin:6px 0; border-radius:6px; border:none; background:#111827; color:white; }
.status.ok { color:#22c55e; }
.status.warn { color:#eab308; }
.status.danger { color:#ef4444; }
#map { height:300px; border-radius:10px; margin-top:10px; }
</style>
</head>

<body>

<div id="home" class="screen active">
  <h2>TULI7 V5</h2>
  <button id="goCreateBtn">CREATE SESSION</button>
  <button id="goJoinBtn">JOIN SESSION</button>
</div>

<div id="createScreen" class="screen">
  <input id="createSessionName" placeholder="Session Name" />
  <input id="createPin" placeholder="PIN" />
  <button id="createSessionBtn">CREATE</button>
  <div id="createMsg"></div>
  <button id="backFromCreate">BACK</button>
</div>

<div id="createdScreen" class="screen">
  <div>Name: <span id="createdName"></span></div>
  <div>PIN: <span id="createdPin"></span></div>
  <button id="openTrainerBtn">OPEN TRAINER</button>
  <button id="createdHomeBtn">HOME</button>
</div>

<div id="joinScreen" class="screen">
  <input id="joinSessionName" placeholder="Session Name" />
  <input id="joinPin" placeholder="PIN" />
  <button id="joinSessionBtn">JOIN</button>
  <div id="joinMsg"></div>
  <button id="backFromJoin">BACK</button>
</div>

<div id="sideScreen" class="screen">
  <button id="blueBtn">BLUE</button>
  <button id="redBtn">RED</button>
</div>

<div id="playerScreen" class="screen">
  <div id="playerSessionInfo"></div>
  <div>ID: <span id="playerId"></span></div>
  <div id="playerStatus" class="status ok">STATUS: OK</div>
  <div id="playerCause">CAUSE: NONE</div>
  <div id="zoneInfo">Zone: NONE</div>
  <div id="gpsInfo">GPS inactive</div>

  <button id="gpsStartBtn">START GPS</button>
  <button id="gpsStopBtn">STOP GPS</button>

  <button id="supBtn">SUP</button>
  <button id="wiaBtn">WIA</button>
  <button id="kiaBtn">KIA</button>
  <button id="resetPlayerBtn">RESET</button>
</div>

<div id="trainerScreen" class="screen">
  <h3 id="trainerTitle"></h3>

  <button data-mode="ARTY" class="active">ARTY</button>
  <button data-mode="MINES">MINES</button>
  <button data-mode="CBRN">CBRN</button>

  <div id="map"></div>

  <div id="blueCount"></div>
  <div id="redCount"></div>
  <div id="totalCount"></div>

  <div id="rosterList"></div>

  <button id="clearMapBtn">CLEAR MAP</button>
  <button id="endSessionBtn">END SESSION</button>
</div>

<script src="app_v5.js" defer></script>

</body>
</html>
